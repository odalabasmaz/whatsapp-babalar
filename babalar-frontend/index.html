<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Babalar</title>
    <script>
      try {
        const s = JSON.parse(localStorage.getItem('babalar-theme') || '{}');
        if (s?.state?.theme !== 'light') document.documentElement.classList.add('dark');
      } catch(e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
