services:
  backend:
    build: ./babalar-backend
    ports:
      - "8000:8000"
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  ingestion:
    build: ./babalar-ingestion
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      RUN_NOW: "false"
    volumes:
      - ./ingestion-session:/app/session
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    stdin_open: true
    tty: true
