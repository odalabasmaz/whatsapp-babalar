services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: babalar
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: babalar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U babalar"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./babalar-backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://babalar:secret@postgres:5432/babalar
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./babalar-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ingestion:
    build: ./babalar-ingestion
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      RUN_NOW: "true"
    depends_on:
      - backend
    volumes:
      - ./ingestion-session:/app/session
    restart: unless-stopped
    stdin_open: true
    tty: true

  frontend:
    build:
      context: ./babalar-frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./babalar-frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://backend:8000

volumes:
  postgres_data:
